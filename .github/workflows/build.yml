name: Build Fabric Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Распаковка исходников из архива
        run: unzip -o midpoint-source.zip -d .

      - name: Установка JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Кэширование зависимостей Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Права на выполнение gradlew
        run: chmod +x ./gradlew

      - name: Сборка мода
        run: ./gradlew build

      - name: Загрузка собранного мода как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod-build
          path: build/libs/*.jar
